name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  ci:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nx affected needs full history

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Nx base/head for affected
        if: ${{ !env.ACT }}
        uses: nrwl/nx-set-shas@v4

      - name: Set Nx base/head for act
        if: ${{ env.ACT }}
        run: |
          echo "NX_BASE=HEAD~1" >> $GITHUB_ENV
          echo "NX_HEAD=HEAD" >> $GITHUB_ENV

      - name: Lint affected
        run: pnpm exec nx affected -t lint --parallel=3

      - name: Type check API
        run: cd apps/api && pnpm exec tsc --noEmit

      - name: Type check Admin
        run: cd apps/admin && pnpm exec tsc --noEmit
