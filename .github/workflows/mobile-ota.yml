name: Mobile OTA Update

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'libs/shared-types/**'
      - 'libs/shared-utils/**'
      - 'libs/ui-config/**'

jobs:
  ota-update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish OTA update
        working-directory: apps/mobile
        run: |
          eas update \
            --branch production \
            --message "Auto update: ${{ github.sha }}" \
            --non-interactive
